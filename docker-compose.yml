services:
  rag-app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - TENANT_ID=${TENANT_ID:-}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-local}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rag-api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - API_KEY=${API_KEY:-}
      - TENANT_ID=${TENANT_ID:-}
      - AUTH_MODE=${AUTH_MODE:-api_key}
      - JWT_SECRET=${JWT_SECRET:-}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-local}
      - QDRANT_URL=http://qdrant:6333
      - MILVUS_URI=http://milvus:19530
      - PROMETHEUS_ENABLED=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - qdrant

  milvus:
    image: milvusdb/milvus:v2.4.0
    command: milvus run standalone
    ports:
      - "19530:19530"
    profiles:
      - milvus

volumes:
  qdrant_data:

services:
  rag-app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - TENANT_ID=${TENANT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  rag-api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - API_KEY=${API_KEY:-}
      - TENANT_ID=${TENANT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
